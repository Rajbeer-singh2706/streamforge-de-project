version: "3.9"

networks:
  streamforge:
    driver: bridge

volumes:
  postgres_data:
  kafka_data:

services:
  zookeeper:     # Day 2
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: sf_zookeeper
    networks: [streamforge]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD","bash","-c","echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5
      
  kafka:         # Day 2
    image: confluentinc/cp-kafka:7.5.0
    container_name: sf_kafka
    networks: [streamforge]
    depends_on:
      zookeeper:
        condition: service_healthy
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_NUM_PARTITIONS: 3
    healthcheck:
      test: ["CMD","kafka-topics","--bootstrap-server","localhost:29092","--list"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: sf_kafka_init
    networks: [streamforge]
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./scripts/create_topics.sh:/create_topics.sh
    command: ["bash", "/create_topics.sh"]
    restart: on-failure

  kafka-ui:      # Day 3
    image: provectuslabs/kafka-ui:latest
    container_name: sf_kafka_ui
    networks: [streamforge]
    depends_on:
      kafka:
        condition: service_healthy
    ports: ["8080:8080"]
    environment:
      KAFKA_CLUSTERS_0_NAME: streamforge-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

  postgres:      # Day 3
    image: postgres:15-alpine
    container_name: sf_postgres
    networks: [streamforge]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    ports:
      - "5432:5432" 
    environment:
      POSTGRES_DB: streamforge
      POSTGRES_USER: sfuser
      POSTGRES_PASSWORD: sfpassword
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U sfuser -d streamforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  producer:
    build:
      context: .
      dockerfile: src/producer/Dockerfile
    container_name: sf_producer
    networks:
      - streamforge
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SIMULATE_INTERVAL_SEC: ${SIMULATE_INTERVAL_SEC:-1.5}
    restart: unless-stopped